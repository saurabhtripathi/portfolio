<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooja Sounds - Motion Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .status {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .start-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: scale(1);
        }

        .sound-indicators {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .sound-card {
            flex: 1;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            opacity: 0.5;
            border: 2px solid transparent;
        }

        .sound-card:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .sound-card.selected {
            opacity: 1;
            border: 2px solid rgba(76, 175, 80, 0.8);
            background: rgba(255, 255, 255, 0.25);
        }

        .sound-card.active {
            background: rgba(76, 175, 80, 0.5);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.8);
        }

        .sound-card h3 {
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .sound-card .gesture {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .instructions h3 {
            margin-bottom: 10px;
        }

        .instructions ul {
            list-style-position: inside;
        }

        .error {
            background: rgba(244, 67, 54, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pooja Sounds</h1>

        <div class="status" id="status">
            Tap "Start" to begin
        </div>

        <div class="sound-indicators">
            <div class="sound-card" id="bellCard">
                <h3>🔔 Aarti Bell</h3>
                <div class="gesture">Move up & down</div>
            </div>
            <div class="sound-card" id="damruCard">
                <h3>🪘 Shiva Damru</h3>
                <div class="gesture">Twist side to side</div>
            </div>
        </div>

        <button class="start-btn" id="startBtn">Start Motion Detection</button>

        <div class="instructions">
            <h3>How to use:</h3>
            <ul>
                <li>Select a sound by tapping the card above</li>
                <li>Tap "Start" to enable motion detection</li>
                <li><strong>Bell:</strong> Move phone up and down</li>
                <li><strong>Damru:</strong> Twist phone side to side</li>
            </ul>
        </div>

        <div class="error" id="error"></div>
    </div>

    <script>
        let isActive = false;
        let lastShakeTime = 0;
        let lastMovementTime = 0;
        let lastX = 0, lastY = 0, lastZ = 0;
        const shakeThreshold = 15;
        const shakeDelay = 500; // Minimum time between sounds in ms
        const stopDelay = 1500; // Stop sound after 1.5 seconds of no movement
        let selectedMode = 'bell'; // Default mode
        let stopTimer = null;

        // Audio elements - Load real sound files
        const bellAudio = new Audio('sounds/bell.m4a');
        const damruAudio = new Audio('sounds/damru.mp3');

        // Set volume and loop
        bellAudio.volume = 0.7;
        damruAudio.volume = 0.7;
        bellAudio.loop = true;
        damruAudio.loop = true;

        function stopAllSounds() {
            bellAudio.pause();
            damruAudio.pause();
            document.getElementById('bellCard').classList.remove('active');
            document.getElementById('damruCard').classList.remove('active');
        }

        function playBell() {
            // Start playing if not already playing
            if (bellAudio.paused) {
                bellAudio.currentTime = 0;
                bellAudio.play().catch(e => console.log('Bell audio play failed:', e));
            }

            // Visual feedback
            document.getElementById('bellCard').classList.add('active');
        }

        function playDamru() {
            // Start playing if not already playing
            if (damruAudio.paused) {
                damruAudio.currentTime = 0;
                damruAudio.play().catch(e => console.log('Damru audio play failed:', e));
            }

            // Visual feedback
            document.getElementById('damruCard').classList.add('active');
        }

        // Mode selection handlers
        document.getElementById('bellCard').addEventListener('click', () => {
            selectedMode = 'bell';
            document.getElementById('bellCard').classList.add('selected');
            document.getElementById('damruCard').classList.remove('selected');
        });

        document.getElementById('damruCard').addEventListener('click', () => {
            selectedMode = 'damru';
            document.getElementById('damruCard').classList.add('selected');
            document.getElementById('bellCard').classList.remove('selected');
        });

        // Set default selection
        document.getElementById('bellCard').classList.add('selected');

        function handleMotion(event) {
            if (!isActive) return;

            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            const x = acc.x || 0;
            const y = acc.y || 0;
            const z = acc.z || 0;

            const deltaX = Math.abs(x - lastX);
            const deltaY = Math.abs(y - lastY);
            const deltaZ = Math.abs(z - lastZ);

            // Only play the selected sound based on any strong movement
            const maxDelta = Math.max(deltaX, deltaY, deltaZ);

            if (maxDelta > shakeThreshold) {
                lastMovementTime = Date.now();

                if (selectedMode === 'bell') {
                    playBell();
                    document.getElementById('status').textContent = 'Bell ringing!';
                } else if (selectedMode === 'damru') {
                    playDamru();
                    document.getElementById('status').textContent = 'Damru playing!';
                }

                // Clear existing stop timer
                if (stopTimer) {
                    clearTimeout(stopTimer);
                }

                // Set new timer to stop sound after 2 seconds of no movement
                stopTimer = setTimeout(() => {
                    stopAllSounds();
                    document.getElementById('status').textContent = 'Listening for motion...';
                }, stopDelay);
            }

            lastX = x;
            lastY = y;
            lastZ = z;
        }

        document.getElementById('startBtn').addEventListener('click', async () => {
            const startBtn = document.getElementById('startBtn');
            const statusDiv = document.getElementById('status');
            const errorDiv = document.getElementById('error');

            try {
                if (!isActive) {
                    // Request permission for iOS 13+
                    if (typeof DeviceMotionEvent.requestPermission === 'function') {
                        const permission = await DeviceMotionEvent.requestPermission();
                        if (permission !== 'granted') {
                            throw new Error('Motion permission denied');
                        }
                    }

                    window.addEventListener('devicemotion', handleMotion);
                    isActive = true;
                    startBtn.textContent = 'Stop Motion Detection';
                    startBtn.style.background = '#f44336';
                    statusDiv.textContent = 'Listening for motion...';
                    errorDiv.style.display = 'none';
                } else {
                    window.removeEventListener('devicemotion', handleMotion);
                    isActive = false;
                    stopAllSounds(); // Stop all sounds when stopping detection
                    if (stopTimer) clearTimeout(stopTimer);
                    startBtn.textContent = 'Start Motion Detection';
                    startBtn.style.background = '#4CAF50';
                    statusDiv.textContent = 'Motion detection stopped';
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'Error: ' + error.message + '. Please ensure you are using HTTPS or localhost.';
                errorDiv.style.display = 'block';
            }
        });

        // Check if device motion is supported
        if (!window.DeviceMotionEvent) {
            document.getElementById('error').textContent = 'Device motion is not supported on this device.';
            document.getElementById('error').style.display = 'block';
            document.getElementById('startBtn').disabled = true;
        }
    </script>
</body>
</html>
